# Single-container deployment for the digital tap list.
# Run scripts/setup.sh, or copy .env.example to .env and edit it, before
# `docker compose up -d`.
services:
  taplist:
    # To build from source instead of pulling a prebuilt image, comment out
    # `image:` below and uncomment `build: .`. See docs/BUILDING.md.
    image: ghcr.io/jceccato/tv-taplist:latest
    # build: .
    container_name: tv-taplist
    restart: unless-stopped
    ports:
      # host:container - point your reverse proxy / TV at the host port.
      - "${PORT}:8080"
    environment:
      # --- secrets (set real values in .env) ---
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      SESSION_SECRET: "${SESSION_SECRET}"
      # --- ops ---
      TZ: "${TZ}"
      # Trust ONLY your Nginx proxy's IP for X-Forwarded-* headers.
      FORWARDED_ALLOW_IPS: "${FORWARDED_ALLOW_IPS}"
      PORT: "8080"
      # Match these to the host user that owns the volume / bind mount.
      PUID: "${PUID}"
      PGID: "${PGID}"
      # Set DEMO_MODE=true on a fresh data directory to seed sample taps (offline demo).
      DEMO_MODE: "${DEMO_MODE}"
      # Optional: Brewfather credentials via env (kept out of config.json on disk).
      BREWFATHER_USER_ID: "${BREWFATHER_USER_ID}"
      BREWFATHER_API_KEY: "${BREWFATHER_API_KEY}"
      # Minutes between Brewfather syncs (default 15; well under 500 calls/hour).
      SYNC_INTERVAL_MINUTES: "${SYNC_INTERVAL_MINUTES}"
    volumes:
      # Map a host directory to /data so config.json, taps/ and old_beers/ persist
      # and stay directly viewable/editable by the server admin. Change the host
      # path with DATA_DIR_HOST in .env (defaults to ./taplist_data beside this file).
      - "${DATA_DIR_HOST}:/data"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
